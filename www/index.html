<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

img {
    width: 180px;
    animation: fadeIn .5s ease;
}

.loader {
    margin-top: 25px;
    width: 42px;
    height: 42px;
    border: 4px solid #e5e5e5;
    border-top: 4px solid #00d5ff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: scale(.9);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}
</style>

</head>

<body>

<img src="resources/splash.png" alt="MandalaNet.id">

<div class="loader"></div>

<script>
setTimeout(() => {
    window.location.href = "https://mport.site.je/";
}, 2000);
</script>

</body>
</html>
