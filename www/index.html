<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* Progress Bar */
#progress {
    position: fixed;
    top: 0;
    left: 0;
    width: 0%;
    height: 4px;
    background: #00d5ff;
    transition: width .1s linear;
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
}

img {
    width: 180px;
    animation: fade .5s ease;
}

.loader {
    margin-top: 25px;
    width: 42px;
    height: 42px;
    border: 4px solid #e5e5e5;
    border-top: 4px solid #00d5ff;
    border-radius: 50%;
    animation: spin .8s linear infinite;
}

#percent {
    margin-top: 15px;
    color: #666;
    font-size: 14px;
    font-weight: bold;
}

@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}

@keyframes fade {
    from {
        opacity: 0;
        transform: scale(.9);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}
</style>

</head>
<body>

<div id="progress"></div>

<div class="container">

    <img src="resources/splash.png" alt="MPorT">

    <div class="loader"></div>

    <div id="percent">0%</div>

</div>

<script>
let p = 0;

const bar = document.getElementById("progress");
const txt = document.getElementById("percent");

const timer = setInterval(() => {

    if (p < 100) {
        p++;
        bar.style.width = p + "%";
        txt.textContent = p + "%";
    } else {
        clearInterval(timer);
        window.location.replace("https://mport.site.je/");
    }

}, 20);
</script>

</body>
</html>
