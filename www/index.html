<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
html,body{
margin:0;
width:100%;
height:100%;
background:#fff;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
font-family:Arial,sans-serif;
}

.container{
text-align:center;
}

img{
width:180px;
}

.loader{
margin:20px auto;
width:40px;
height:40px;
border:4px solid #ddd;
border-top:4px solid #00d5ff;
border-radius:50%;
animation:spin .8s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}
</style>
</head>
<body>

<div class="container">
<img src="resources/splash.png" alt="MPorT">
<div class="loader"></div>
<p>Menghubungkan...</p>
</div>

<script>
setTimeout(()=>{
location.href="https://mport.site.je/";
},1500);
</script>

</body>
</html>
